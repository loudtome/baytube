<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Bay Conditions</title>
<style>
  :root {
    --bg:      #0b1922;
    --bg-deep: #07111a;
    --panel:   rgba(255,255,255,0.04);
    --panel-2: rgba(255,255,255,0.06);
    --line:    rgba(173,201,214,0.14);
    --ink:     #e9eef0;
    --muted:   #88a0ac;
    --brass:   #e0a85e;
    --ok:      #6fb6a4;
    --warn:    #e07d5e;
    --red:     #e2564d;
    --amber:   #e0a85e;
    --green:   #5fae8e;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --mono: ui-monospace, "DejaVu Sans Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: radial-gradient(130% 100% at 50% 0%, var(--bg) 0%, var(--bg-deep) 100%);
    color: var(--ink);
    font-family: var(--sans);
    overflow: hidden;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  body.kiosk { cursor: none; }

  .app {
    height: 100vh; height: 100dvh;
    display: grid;
    grid-template-rows: auto 1fr;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  /* ---------- SCA banner (persistent, every tab) ---------- */
  .sca {
    display: flex; align-items: center; gap: 12px;
    padding: clamp(8px,1.4vh,14px) clamp(16px,3vw,30px);
    font-weight: 600; letter-spacing: 0.01em;
    font-size: clamp(14px, 2.1vh, 20px);
    border-bottom: 1px solid var(--line);
    transition: background 400ms ease, color 400ms ease;
  }
  .sca .icon { font-size: 1.3em; line-height: 1; }
  .sca .sub { font-weight: 400; color: inherit; opacity: 0.8; font-size: 0.8em; margin-left: auto; font-family: var(--mono); }
  .sca.none     { background: rgba(95,174,142,0.12);  color: #bfe6d5; }
  .sca.active   { background: rgba(226,86,77,0.20);   color: #ffd7d2; }
  .sca.expected { background: rgba(224,168,94,0.16);  color: #ffe6c4; }
  .sca.unknown  { background: var(--panel); color: var(--muted); }
  @media (prefers-reduced-motion: no-preference) {
    .sca.active { animation: scaPulse 2.6s ease-in-out infinite; }
  }
  @keyframes scaPulse { 0%,100%{ background: rgba(226,86,77,0.16);} 50%{ background: rgba(226,86,77,0.30);} }

  /* ---------- main = rail + content ---------- */
  .main { display: grid; min-height: 0; grid-template-columns: auto 1fr; }
  @media (orientation: portrait) { .main { grid-template-columns: 1fr; grid-template-rows: 1fr auto; } }

  /* ---------- tab rail ---------- */
  .rail {
    display: flex; flex-direction: column; gap: 8px;
    padding: clamp(10px,2vh,20px) clamp(8px,1.2vw,14px);
    border-right: 1px solid var(--line);
    overflow: auto;
  }
  @media (orientation: portrait) {
    .rail { flex-direction: row; border-right: none; border-top: 1px solid var(--line);
            order: 2; justify-content: space-between; padding: 8px clamp(8px,3vw,20px); gap: 6px; }
  }
  .tab {
    appearance: none; border: 0; cursor: pointer; color: var(--muted);
    background: var(--panel); border-radius: 10px;
    padding: clamp(10px,1.5vh,16px) clamp(12px,1vw,18px);
    font-family: var(--sans); font-size: clamp(12px,1.5vh,15px); font-weight: 600;
    letter-spacing: 0.02em; text-align: left; white-space: nowrap;
    display: flex; align-items: center; gap: 9px;
    border-left: 3px solid transparent;
    transition: background 200ms, color 200ms, transform 120ms, box-shadow 200ms;
  }
  @media (orientation: portrait) {
    .tab { flex: 1 1 0; justify-content: center; text-align: center;
           border-left: 0; border-top: 3px solid transparent; padding: 10px 6px; }
  }
  .tab .pip { width: 8px; height: 8px; border-radius: 50%; background: currentColor; opacity: 0.5; flex: none; }
  .tab.s-offline .pip { background: var(--warn); opacity: 1; }
  .tab.s-live .pip { background: var(--ok); opacity: 1; }
  /* selected "down" state */
  .tab.active {
    color: var(--ink); background: var(--bg-deep);
    border-left-color: var(--brass);
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(224,168,94,0.25);
    transform: translateY(1px);
  }
  @media (orientation: portrait) {
    .tab.active { border-left-color: transparent; border-top-color: var(--brass); }
  }
  .tab .cyc {
    margin-left: auto; width: 26px; height: 3px; border-radius: 2px;
    background: var(--line); overflow: hidden; flex: none;
  }
  @media (orientation: portrait) { .tab .cyc { display: none; } }
  .tab .cyc > i { display: block; height: 100%; width: 0; background: linear-gradient(90deg,var(--ok),var(--brass)); }
  .tab.active .cyc > i.run { width: 100%; }

  /* ---------- content ---------- */
  .content { position: relative; min-height: 0; min-width: 0; display: flex; flex-direction: column; }
  @media (orientation: portrait) { .content { order: 1; } }
  .head { display: flex; align-items: baseline; justify-content: space-between; gap: 14px;
          padding: clamp(10px,1.8vh,18px) clamp(16px,3vw,30px) 0; }
  .head .title { font-size: clamp(18px,3vh,30px); font-weight: 600; }
  .head .kicker { font-family: var(--mono); font-size: clamp(9px,1.3vh,12px); letter-spacing: 0.2em;
                  text-transform: uppercase; color: var(--muted); }
  .head .stamp { font-family: var(--mono); font-size: clamp(10px,1.4vh,13px); color: var(--muted); white-space: nowrap; }
  .view { flex: 1; min-height: 0; padding: clamp(10px,1.6vh,18px) clamp(16px,3vw,30px) clamp(14px,2vh,22px);
          display: flex; min-width: 0; }

  /* map / frames stage */
  .stage { position: relative; flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; min-width: 0; }
  .stage img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 6px;
               background: #fff; box-shadow: 0 14px 40px rgba(0,0,0,0.45); }
  /* animation frames are stacked and cross-cut by opacity (no src swap = no flash) */
  .stage img.frame { position: absolute; top: 0; left: 0; right: 0; bottom: 0;
               width: 100%; height: 100%; object-fit: contain; border-radius: 6px;
               background: transparent; box-shadow: none; opacity: 0; }
  .stage img.frame.on { opacity: 1; }
  .stage.loading::after { content: "building the loop…"; color: var(--muted);
               font-family: var(--mono); font-size: clamp(12px,1.8vh,15px); }
  .framebadge { position: absolute; bottom: 8px; right: 10px; font-family: var(--mono);
                font-size: 11px; color: var(--muted); background: rgba(7,17,26,0.7);
                padding: 3px 8px; border-radius: 6px; }

  /* stat + map split (wind / waves) */
  .split { display: flex; gap: clamp(14px,2vw,26px); flex: 1; min-height: 0; min-width: 0; }
  @media (orientation: portrait) { .split { flex-direction: column; } }
  .split .readout { flex: 0 0 clamp(180px, 26%, 300px); display: flex; flex-direction: column;
                    justify-content: center; gap: 14px; }
  @media (orientation: portrait) { .split .readout { flex: none; flex-direction: row; align-items: center;
                    justify-content: space-around; gap: 10px; } }
  .split .stage { flex: 1; }

  .big { font-variant-numeric: tabular-nums; line-height: 0.95; }
  .big .n { font-size: clamp(52px, 12vh, 120px); font-weight: 700; letter-spacing: -0.02em; }
  .big .u { font-size: clamp(16px, 3vh, 26px); color: var(--muted); margin-left: 6px; }
  .big .lbl { font-family: var(--mono); font-size: clamp(10px,1.4vh,13px); letter-spacing: 0.16em;
              text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .sub2 { font-family: var(--mono); font-size: clamp(11px,1.6vh,14px); color: var(--muted); }

  /* compass */
  .compass { width: clamp(120px, 20vh, 200px); height: clamp(120px, 20vh, 200px); flex: none; }
  .compass text { fill: var(--muted); font-family: var(--mono); font-size: 12px; }
  .compass .ring { fill: none; stroke: var(--line); stroke-width: 2; }
  .compass .tick { stroke: var(--line); stroke-width: 2; }
  .compass .arrow { fill: var(--brass); transition: transform 700ms cubic-bezier(.2,.8,.2,1); transform-box: view-box; }
  .compass .tail  { fill: rgba(136,160,172,0.5); }

  /* overview grid */
  .grid { display: grid; gap: clamp(10px,1.6vh,16px); flex: 1; min-height: 0;
          grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr); }
  @media (orientation: portrait) { .grid { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(3, 1fr); } }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
          padding: clamp(12px,2vh,20px); display: flex; flex-direction: column; justify-content: center; gap: 6px; min-height: 0; }
  .card .lbl { font-family: var(--mono); font-size: clamp(9px,1.3vh,12px); letter-spacing: 0.16em;
               text-transform: uppercase; color: var(--muted); }
  .card .v { font-size: clamp(26px,5vh,48px); font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1; }
  .card .v small { font-size: 0.42em; color: var(--muted); font-weight: 600; }
  .card .x { font-size: clamp(11px,1.6vh,14px); color: var(--muted); }
  .card.sca-card.none { border-color: rgba(95,174,142,0.55); background: rgba(95,174,142,0.12); }
  .card.sca-card.none .v { color: var(--green); }
  .card.sca-card.active, .card.sca-card.expected { border-color: rgba(226,86,77,0.65); background: rgba(226,86,77,0.15); }
  .card.sca-card.active .v, .card.sca-card.expected .v { color: var(--red); }
  .card .arrowmini { display:inline-block; transition: transform 600ms ease; }

  /* line chart (wind speed / wave height vs time) */
  .graphwrap { flex: 1; min-width: 0; min-height: 0; display: flex; align-items: center;
               justify-content: center; padding-left: clamp(6px,1.4vw,18px); }
  @media (orientation: portrait) { .graphwrap { padding-left: 0; padding-bottom: 6px; } }
  .chart { width: 100%; height: 100%; }
  .chart .gl { stroke: rgba(173,201,214,0.12); stroke-width: 1; vector-effect: non-scaling-stroke; }
  .chart .ax { fill: var(--muted); font-family: var(--mono); font-size: 12px; }
  .chart .yl { text-anchor: end; }
  .chart .unit { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; }
  .chart .area { fill: url(#cg); stroke: none; }
  .chart .cline { fill: none; stroke: var(--brass); stroke-width: 2.5;
                  vector-effect: non-scaling-stroke; stroke-linejoin: round; stroke-linecap: round; }
  .chart .pt { fill: var(--brass); stroke: var(--bg-deep); stroke-width: 2; }
  .chart .dlab { fill: var(--ink); stroke: var(--bg-deep); stroke-width: 3; paint-order: stroke;
                 font-family: var(--mono); font-size: 12px; font-weight: 700; text-anchor: middle; }
  .chart .dtick { stroke: rgba(224,168,94,0.5); stroke-width: 1.5; vector-effect: non-scaling-stroke; }

  /* wave / wind forecast table */
  .split.waves .readout, .split.wind .readout {
                          flex-direction: column; align-items: stretch; justify-content: flex-start;
                          flex: 0 0 clamp(260px, 42%, 440px); min-height: 0; }
  @media (orientation: portrait) {
    .split.waves .readout, .split.wind .readout { flex: 1 1 0; }
    .graphwrap { flex: 1 1 0; } }
  .windnow { display: flex; align-items: center; gap: 14px; margin-top: 4px; }
  .windnow .compass { width: clamp(90px,14vh,140px); height: clamp(90px,14vh,140px); }
  .windnow .card-dir { font-size: clamp(26px,6vh,52px); font-weight: 700; line-height: 1; }
  .wtable { display: flex; flex-direction: column; gap: 4px; margin-top: clamp(8px,1.5vh,14px);
            min-height: 0; overflow: auto; font-variant-numeric: tabular-nums; }
  .wrow { display: grid; grid-template-columns: 3.4em 1fr 2.8em 4.4em; align-items: center; gap: 9px;
          font-size: clamp(10px,1.6vh,13px); }
  .wrow .wt { color: var(--muted); font-family: var(--mono); white-space: nowrap; }
  .wrow .wbar { height: 9px; border-radius: 5px; background: var(--panel-2); overflow: hidden; }
  .wrow .wbar > i { display: block; height: 100%; border-radius: 5px;
                    background: linear-gradient(90deg, var(--ok), var(--brass)); }
  .wrow .wv { text-align: right; font-weight: 600; white-space: nowrap; }
  .wrow .ww { text-align: right; color: var(--muted); white-space: nowrap; font-family: var(--mono); }
  .wrow .ww .warr { display: inline-block; margin-right: 3px; color: var(--brass); }
  .wrow.now .wt, .wrow.now .wv, .wrow.now .ww { color: var(--ink); }
  .wrow.now .wbar { box-shadow: inset 0 0 0 1px rgba(224,168,94,0.4); }
  .wrow.whead { font-family: var(--mono); font-size: clamp(8px,1.2vh,11px); letter-spacing: 0.12em;
                text-transform: uppercase; color: var(--muted); opacity: 0.7; }
  .wrow.whead .wbar { background: none; }

  /* tides */
  .tidewrap { display:flex; flex-direction:column; gap: clamp(10px,2vh,18px); flex:1; min-height:0; }
  .tidenow { display:flex; align-items:baseline; gap:16px; flex-wrap:wrap; }
  .tidesched { display:flex; gap:10px; flex-wrap:wrap; }
  .tideitem { background:var(--panel); border:1px solid var(--line); border-radius:12px;
              padding: clamp(10px,1.6vh,16px) clamp(12px,1.4vw,18px); display:flex; flex-direction:column; gap:4px; min-width:104px; }
  .tideitem.next { border-color: var(--brass); box-shadow: inset 0 0 0 1px rgba(224,168,94,0.3); }
  .tideitem.past { opacity: 0.45; }
  .tideitem .tt { font-family:var(--mono); font-size: clamp(9px,1.3vh,12px); letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); }
  .tideitem .th { font-size: clamp(18px,2.6vh,26px); font-weight:700; }
  .tideitem .tf { font-size: clamp(11px,1.5vh,13px); color:var(--muted); }

  /* decorative sailboat */
  .boatwrap { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; padding-top: 6px; }
  .boat { width: auto; height: 100%; max-height: 38vh; max-width: 90%; opacity: 0.92; }
  .boat .hull { fill: #12303f; stroke: rgba(173,201,214,0.35); stroke-width: 2; }
  .boat .mast { stroke: rgba(233,238,240,0.7); stroke-width: 2.5; }
  .boat .sail { fill: rgba(224,168,94,0.92); }
  .boat .jib  { fill: rgba(233,238,240,0.85); }
  .boat .wave { fill: none; stroke: rgba(111,182,164,0.55); stroke-width: 3; stroke-linecap: round; }
  .boat .flag { fill: var(--warn); }
  /* faint seascape watermark behind the overview grid */
  .seascape { position: absolute; right: clamp(10px,3vw,40px); bottom: clamp(6px,2vh,26px);
              width: min(46vh, 40vw); pointer-events: none; opacity: 0.10; z-index: 0; }
  .seascape .sail, .seascape .jib { fill: var(--ink); }
  .seascape .hull { fill: var(--ink); stroke: none; }
  .seascape .mast { stroke: var(--ink); }
  .seascape .wave { stroke: var(--ink); }
  .grid { position: relative; z-index: 1; }

  .placeholder { color: var(--muted); font-family: var(--mono); text-align:center; margin:auto;
                 font-size: clamp(13px,2vh,17px); line-height:1.5; max-width: 34ch; }
  .dim { color: var(--muted); }
  .hide { display: none !important; }
</style>
</head>
<body>
  <div class="app">
    <div class="sca unknown" id="sca"><span class="icon">•</span><span id="scaText">Loading conditions…</span><span class="sub" id="scaSub"></span></div>
    <div class="main">
      <nav class="rail" id="rail"></nav>
      <section class="content">
        <div class="head">
          <div><div class="kicker" id="kicker">Bay Conditions</div><div class="title" id="title">Starting up</div></div>
          <div class="stamp" id="stamp"></div>
        </div>
        <div class="view" id="view"><div class="placeholder">Warming up the buoys…</div></div>
      </section>
    </div>
  </div>

<script>
(function () {
  "use strict";
  var $ = function (id) { return document.getElementById(id); };
  var els = { sca:$("sca"), scaText:$("scaText"), scaSub:$("scaSub"), rail:$("rail"),
              kicker:$("kicker"), title:$("title"), stamp:$("stamp"), view:$("view") };

  // detect a mouse so we only hide the cursor on the kiosk (Pi), not the iPad
  window.addEventListener("mousemove", function once(){ document.body.classList.remove("kiosk"); window.removeEventListener("mousemove", once); });
  document.body.classList.add("kiosk");

  // Stamped at deploy time (sha of index.html). If a later manifest poll
  // reports a different app_version, this tab is running stale markup —
  // reload so design/schema changes reach a long-lived kiosk hands-free,
  // without waiting for the multi-hour backstop reload. The leading-"_"
  // guard skips the un-substituted placeholder during local dev.
  var APP_VERSION = "__APP_VERSION__";

  var manifest = null, stats = null, tabs = [];
  var idx = 0, autoTimer = null, resumeTimer = null, frameTimer = null, pinned = false;
  var cfg = { tab_seconds:10, resume_after_seconds:60, frame_ms:1000,
              manifest_reload_seconds:60, stats_reload_seconds:120, page_reload_hours:8 };
  var reloadScheduled = false;
  var CARD = ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];

  function fmtClock(iso){ if(!iso) return "—"; var d=new Date(iso); if(isNaN(d)) return "—";
    return d.toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"}); }
  function fmtDayTime(iso){ var d=new Date(iso); if(isNaN(d)) return "—";
    var t=d.toLocaleTimeString(undefined,{hour:"numeric"});
    if(d.toDateString()===new Date().toDateString()) return t;
    return d.toLocaleDateString(undefined,{weekday:"short"})+" "+t; }
  function fmtAgo(iso){ if(!iso) return ""; var d=new Date(iso); if(isNaN(d)) return "";
    var m=Math.round((Date.now()-d.getTime())/60000);
    if(m<1) return "just now"; if(m<60) return m+" min ago";
    var h=Math.round(m/60); if(h<24) return h+"h ago"; return Math.round(h/24)+"d ago"; }
  function num(v,d){ return (v===null||v===undefined||isNaN(v)) ? (d===undefined?"—":d) : v; }
  function cardinalOf(deg){ return (deg==null)?"":CARD[Math.round(deg/22.5)%16]; }

  /* ---------------- SCA banner ---------------- */
  function renderSCA(){
    var s = stats && stats.sca;
    var e = els.sca, t = els.scaText, sub = els.scaSub;
    if(!s){ e.className="sca unknown"; t.textContent="Small craft advisory: unknown"; sub.textContent=""; return; }
    if(s.status==="active"){
      e.className="sca active"; e.firstChild.textContent="⚠";
      t.textContent="SMALL CRAFT ADVISORY IN EFFECT";
      sub.textContent = s.ends_iso ? "until "+fmtClock(s.ends_iso) : "";
    } else if(s.status==="expected"){
      e.className="sca expected"; e.firstChild.textContent="⚠";
      t.textContent="Small craft advisory expected";
      sub.textContent = s.starts_iso ? "starts "+fmtClock(s.starts_iso) : "next 24h";
    } else {
      e.className="sca none"; e.firstChild.textContent="✓";
      t.textContent="No small craft advisory";
      sub.textContent = "waters look manageable";
    }
  }

  /* ---------------- compass svg ---------------- */
  function compassSVG(deg){
    var rot = (deg==null? 0 : deg);
    return '<svg class="compass" viewBox="0 0 120 120" aria-hidden="true">'
      + '<circle class="ring" cx="60" cy="60" r="52"/>'
      + '<line class="tick" x1="60" y1="8" x2="60" y2="18"/><line class="tick" x1="60" y1="102" x2="60" y2="112"/>'
      + '<line class="tick" x1="8" y1="60" x2="18" y2="60"/><line class="tick" x1="102" y1="60" x2="112" y2="60"/>'
      + '<text x="60" y="30" text-anchor="middle">N</text><text x="60" y="98" text-anchor="middle">S</text>'
      + '<text x="94" y="64" text-anchor="middle">E</text><text x="26" y="64" text-anchor="middle">W</text>'
      + '<g class="arrow" transform="rotate('+rot+' 60 60)">'
      +   '<polygon points="60,20 52,64 60,56 68,64"/>'
      +   '<polygon class="tail" points="60,100 54,64 60,70 66,64"/>'
      + '</g></svg>';
  }

  /* ---------------- sailboat (inline svg, no external asset) ---------------- */
  function boatSVG(cls){
    return '<svg class="boat '+(cls||"")+'" viewBox="0 0 240 210" preserveAspectRatio="xMidYMax meet" aria-hidden="true">'
      + '<line class="mast" x1="120" y1="14" x2="120" y2="150"/>'
      + '<path class="flag" d="M120 16 L150 24 L120 32 Z"/>'
      + '<path class="jib"  d="M114 40 C 92 78, 84 116, 92 150 L114 150 Z"/>'
      + '<path class="sail" d="M126 30 C 160 74, 168 118, 156 150 L126 150 Z"/>'
      + '<path class="hull" d="M52 152 L188 152 C 180 178, 160 188, 120 188 C 80 188, 60 178, 52 152 Z"/>'
      + '<path class="wave" d="M14 178 q 22 -11 44 0 t 44 0 t 44 0 t 44 0 t 44 0"/>'
      + '<path class="wave" d="M6 194 q 22 -11 44 0 t 44 0 t 44 0 t 44 0 t 44 0"/>'
      + '</svg>';
  }

  /* ---------------- line chart (svg) ---------------- */
  function axisTop(m){ var c=[1,2,3,4,5,6,8,10,12,15,20,25,30,40,50,60,80,100];
    for(var i=0;i<c.length;i++) if(c[i]>=m) return c[i]; return Math.ceil(m/20)*20; }
  function niceStep(top){ return top<=6?1: top<=12?2: top<=30?5: top<=60?10:20; }
  function lineChart(pts, opts){
    opts=opts||{}; var key=opts.key||"v", unit=opts.unit||"";
    pts=(pts||[]).filter(function(p){ return p[key]!=null; });
    if(pts.length<2) return '<div class="placeholder">Forecast not available yet.</div>';
    var W=640,H=380, mL=38,mR=16,mT=18,mB=30, iw=W-mL-mR, ih=H-mT-mB;
    var mx=0; pts.forEach(function(p){ if(p[key]>mx) mx=p[key]; });
    var top=axisTop(mx), step=niceStep(top);
    var t0=new Date(pts[0].iso).getTime(), t1=new Date(pts[pts.length-1].iso).getTime(), span=(t1-t0)||1;
    function X(iso){ return mL+(new Date(iso).getTime()-t0)/span*iw; }
    function Y(v){ return mT+ih-(v/top)*ih; }
    var g="";
    for(var tv=0; tv<=top+1e-6; tv+=step){
      var yy=Y(tv);
      g+='<line class="gl" x1="'+mL+'" y1="'+yy.toFixed(1)+'" x2="'+(W-mR)+'" y2="'+yy.toFixed(1)+'"/>'
       + '<text class="ax yl" x="'+(mL-6)+'" y="'+(yy+3.5).toFixed(1)+'">'+tv+'</text>';
    }
    for(var h=0; h<=48; h+=12){
      var tt=t0+h*3600000; if(tt>t1+1) break;
      var xx=X(new Date(tt).toISOString());
      g+='<line class="gl" x1="'+xx.toFixed(1)+'" y1="'+mT+'" x2="'+xx.toFixed(1)+'" y2="'+(mT+ih)+'"/>'
       + '<text class="ax" x="'+xx.toFixed(1)+'" y="'+(H-10)+'" text-anchor="middle">'+(h===0?"now":fmtDayTime(new Date(tt).toISOString()))+'</text>';
    }
    var d=""; pts.forEach(function(p,i){ d+=(i?" L":"M")+X(p.iso).toFixed(1)+" "+Y(p[key]).toFixed(1); });
    var area=d+" L"+X(pts[pts.length-1].iso).toFixed(1)+" "+(mT+ih)+" L"+X(pts[0].iso).toFixed(1)+" "+(mT+ih)+" Z";

    // direction notation (e.g. "NE") at inflections/turning points of the curve
    var labels="";
    if(opts.dirKey){
      var picks=[0];
      for(var k=1;k<pts.length-1;k++){
        var s1=pts[k][key]-pts[k-1][key], s2=pts[k+1][key]-pts[k][key];
        if((s1>=0)!==(s2>=0)) picks.push(k);   // slope sign flips = turning point
      }
      picks.push(pts.length-1);
      var lastX=-1e9;
      picks.forEach(function(k){
        var p=pts[k], deg=p[opts.dirKey]; if(deg==null) return;
        var px=X(p.iso); if(px-lastX < 46) return;   // keep labels from crowding
        lastX=px;
        var peak = (k===0||pts[k][key]>=pts[k-1][key]) && (k===pts.length-1||pts[k][key]>=pts[k+1][key]);
        var py=Y(p[key]);
        var ly=peak ? py-9 : py+17;
        if(ly<mT+11) ly=mT+11; if(ly>mT+ih-3) ly=mT+ih-3;
        labels += '<line class="dtick" x1="'+px.toFixed(1)+'" y1="'+py.toFixed(1)+'" x2="'+px.toFixed(1)+'" y2="'+(peak?py-6:py+6).toFixed(1)+'"/>'
          + '<text class="dlab" x="'+px.toFixed(1)+'" y="'+ly.toFixed(1)+'">'+CARD[Math.round(deg/22.5)%16]+'</text>';
      });
    }

    return '<svg class="chart" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">'
      + '<defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">'
      +   '<stop offset="0" stop-color="#e0a85e" stop-opacity="0.38"/>'
      +   '<stop offset="1" stop-color="#e0a85e" stop-opacity="0.02"/></linearGradient></defs>'
      + g
      + '<path class="area" d="'+area+'"/><path class="cline" d="'+d+'"/>'
      + '<circle class="pt" cx="'+X(pts[0].iso).toFixed(1)+'" cy="'+Y(pts[0][key]).toFixed(1)+'" r="4"/>'
      + labels
      + '<text class="ax unit" x="'+mL+'" y="'+(mT-5)+'">'+unit+'</text></svg>';
  }

  /* ---------------- views ---------------- */
  function tabById(id){ for(var i=0;i<tabs.length;i++) if(tabs[i].id===id) return tabs[i]; return null; }

  function renderOverview(){
    var w=(stats&&stats.wind)||{}, wv=(stats&&stats.waves)||{}, wt=(stats&&stats.water)||{},
        air=(stats&&stats.air)||{}, td=(stats&&stats.tide)||{}, sc=(stats&&stats.sca)||{status:"unknown"};
    var next = td.next;
    var tideLine = td.state ? (cap(td.state) + (next? " · "+(next.type==="H"?"high":"low")+" "+fmtClock(next.iso):"")) : "—";
    var scaTxt = sc.status==="active"?"In effect": sc.status==="expected"?"Expected": sc.status==="none"?"None":"—";
    var arrow = w.dir_deg!=null ? '<span class="arrowmini" style="transform:rotate('+w.dir_deg+'deg)">↑</span> ' : '';
    var html = '<div class="grid">'
      + card("sca-card "+ (sc.status||"none"), "Small Craft Advisory", scaTxt,
             sc.status==="active"&&sc.ends_iso?("until "+fmtClock(sc.ends_iso)): sc.status==="expected"&&sc.starts_iso?("from "+fmtClock(sc.starts_iso)):"")
      + card("", "Wind", num(w.speed_kt)+'<small> kt '+(w.dir_cardinal||"")+'</small>',
             (w.gust_kt!=null?("gusts "+w.gust_kt+" kt · "):"")+ (arrow? "from "+(w.dir_cardinal||""):"") )
      + card("", "Wave Height", num(wv.height_ft)+'<small> ft</small>', "significant, forecast")
      + card("", "Water Temp", num(wt.temp_f)+'<small> °F</small>', wt.obs_iso?fmtAgo(wt.obs_iso):"")
      + card("", "Air Temp", num(air.temp_f)+'<small> °F</small>', air.obs_iso?fmtAgo(air.obs_iso):(air.source||""))
      + card("", "Tide", num(td.now_ft)+'<small> ft</small>', tideLine)
      + '</div>';
    els.view.innerHTML = boatSVG("seascape") + html;
  }
  function card(cls,label,value,extra){
    return '<div class="card '+cls+'"><div class="lbl">'+label+'</div><div class="v">'+value+'</div>'
      + '<div class="x">'+(extra||"")+'</div></div>';
  }
  function cap(s){ return s? s.charAt(0).toUpperCase()+s.slice(1):s; }

  function renderWind(tab){
    var w=(stats&&stats.wind)||{};
    var fc=w.forecast||[];
    var maxkt=0; fc.forEach(function(f){ if(f.kt>maxkt) maxkt=f.kt; });
    var scale=maxkt>0?maxkt:1;
    var rows=fc.map(function(f,i){
      var bw=Math.max(4,Math.round(f.kt/scale*100));
      var dir = f.dir_deg!=null
        ? '<span class="warr" style="transform:rotate('+f.dir_deg+'deg)">↑</span>'+cardinalOf(f.dir_deg) : '—';
      return '<div class="wrow'+(i===0?" now":"")+'"><span class="wt">'+(i===0?"now":fmtDayTime(f.iso))+'</span>'
        + '<span class="wbar"><i style="width:'+bw+'%"></i></span>'
        + '<span class="wv">'+f.kt+' kt</span>'
        + '<span class="ww">'+dir+'</span></div>';
    }).join("");
    var head = '<div class="wrow whead"><span class="wt">time</span><span></span>'
      + '<span class="wv">wind</span><span class="ww">dir</span></div>';
    var readout = '<div class="big"><div class="lbl">Wind speed now</div>'
      + '<span class="n">'+num(w.speed_kt)+'</span><span class="u">kt</span></div>'
      + '<div class="sub2">'+(w.gust_kt!=null?("gusts "+w.gust_kt+" kt"):"")
      +   (w.obs_iso?(" · "+fmtAgo(w.obs_iso)):"")+(w.source?(" · "+w.source):"")+'</div>'
      + '<div class="windnow">'+compassSVG(w.dir_deg)
      +   '<div><div class="card-dir">'+(w.dir_cardinal||cardinalOf(w.dir_deg)||"—")+'</div>'
      +   '<div class="sub2">'+(w.dir_deg!=null?("from "+w.dir_deg+"°"):"")+'</div></div></div>'
      + '<div class="wtable">'+(rows?head+rows:'<div class="dim">No forecast yet.</div>')+'</div>';
    els.view.innerHTML = '<div class="split wind"><div class="readout">'+readout+'</div>'
      + '<div class="graphwrap">'+lineChart(fc,{key:"kt",unit:"kt",dirKey:"dir_deg"})+'</div></div>';
  }

  function renderWaves(tab){
    var wv=(stats&&stats.waves)||{};
    var fc=wv.forecast||[];
    var maxft=0; fc.forEach(function(f){ if(f.ft>maxft) maxft=f.ft; });
    var scale = maxft>0?maxft:1;
    var rows = fc.map(function(f,i){
      var w=Math.max(4, Math.round(f.ft/scale*100));
      var wind="—";
      if(f.wind_kt!=null){
        var arr = f.wind_dir_deg!=null
          ? '<span class="warr" style="transform:rotate('+f.wind_dir_deg+'deg)">↑</span>' : '';
        wind = arr + f.wind_kt + ' kt';
      }
      return '<div class="wrow'+(i===0?" now":"")+'"><span class="wt">'+(i===0?"now":fmtDayTime(f.iso))+'</span>'
        + '<span class="wbar"><i style="width:'+w+'%"></i></span>'
        + '<span class="wv">'+f.ft+' ft</span>'
        + '<span class="ww">'+wind+'</span></div>';
    }).join("");
    var head = '<div class="wrow whead"><span class="wt">time</span><span></span>'
      + '<span class="wv">wave</span><span class="ww">wind</span></div>';
    var readout = '<div class="big"><div class="lbl">Significant wave height</div>'
      + '<span class="n">'+num(wv.height_ft)+'</span><span class="u">ft</span></div>'
      + '<div class="sub2">'+(maxft>0?("peak "+maxft+" ft next 48h"):"forecast")+'</div>'
      + '<div class="wtable">'+(rows?head+rows:'<div class="dim">No forecast yet.</div>')+'</div>';
    els.view.innerHTML = '<div class="split waves"><div class="readout">'+readout+'</div>'
      + '<div class="graphwrap">'+lineChart(fc,{key:"ft",unit:"ft"})+'</div></div>';
  }

  function renderTides(){
    var td=(stats&&stats.tide)||{};
    var evs = (td.events||[]).slice();
    var now = Date.now();
    // show the last past event + all upcoming today/tomorrow (cap 6)
    var future = evs.filter(function(e){ return new Date(e.iso).getTime()>now; });
    var past = evs.filter(function(e){ return new Date(e.iso).getTime()<=now; });
    var show = (past.slice(-1)).concat(future).slice(0,6);
    var nextIso = td.next && td.next.iso;
    var items = show.map(function(e){
      var isNext = e.iso===nextIso, isPast = new Date(e.iso).getTime()<=now;
      var hi = e.type==="H";
      return '<div class="tideitem'+(isNext?" next":"")+(isPast?" past":"")+'">'
        + '<div class="tt">'+(hi?"▲ High":"▼ Low")+'</div>'
        + '<div class="th">'+fmtClock(e.iso)+'</div>'
        + '<div class="tf">'+e.ft+' ft</div></div>';
    }).join("");
    var stateTxt = td.state? cap(td.state): "—";
    els.view.innerHTML = '<div class="tidewrap">'
      + '<div class="tidenow"><div class="big"><div class="lbl">Now · '+stateTxt+'</div>'
      +   '<span class="n">'+num(td.now_ft)+'</span><span class="u">ft</span></div>'
      +   '<div class="sub2">'+(td.obs_iso?("as of "+fmtClock(td.obs_iso)):"")+'</div></div>'
      + '<div class="tidesched">'+(items||'<div class="placeholder">No tide data.</div>')+'</div>'
      + '<div class="boatwrap">'+boatSVG("")+'</div></div>';
  }

  function renderImage(tab){
    els.view.innerHTML = '<div class="stage" id="stage"></div>';
    var stage=$("stage");
    if(!tab.file){ stage.innerHTML='<div class="placeholder">Waiting for first download.</div>'; return; }
    var img=new Image();
    img.onload=function(){ stage.innerHTML=""; stage.appendChild(img); };
    img.onerror=function(){ stage.innerHTML='<div class="placeholder">Map unavailable. It will return on the next download.</div>'; };
    img.src="images/"+tab.file+"?v="+encodeURIComponent(tab.last_success_iso||"0");
  }

  /* frames animation shared by wind/waves.
     All frames are stacked <img> layers; we decode every one BEFORE the loop
     starts, then advance by toggling the `.on` opacity class. No src swap
     during playback -> no white flash on the first pass through. */
  var frameToken = 0;
  function mountFrames(tab, stage){
    stopFrames();
    var frames = tab.frames || [];
    if(!frames.length){ stage.innerHTML=''; stage.className='stage'; stage.textContent='Building the loop…'; return; }
    var bust = "?v="+encodeURIComponent(tab.frames_last_success||"0");
    var token = ++frameToken;               // guards against a late decode after tab switch
    stage.innerHTML=""; stage.className="stage loading";
    var imgs = frames.map(function(f){
      var im = document.createElement("img");
      im.className = "frame"; im.decoding = "async"; im.alt = "";
      im.src = "images/" + f + bust;
      stage.appendChild(im);
      return im;
    });
    var badge = document.createElement("div"); badge.className="framebadge"; stage.appendChild(badge);

    function decoded(im){ return im.decode ? im.decode().catch(function(){}) : new Promise(function(res){ im.onload=im.onerror=res; }); }
    var i = 0;
    function show(k){ for(var j=0;j<imgs.length;j++) imgs[j].classList.toggle("on", j===k); badge.textContent=(k+1)+"/"+imgs.length; }

    // paint the first frame as soon as it's ready so the tab isn't blank…
    decoded(imgs[0]).then(function(){ if(token===frameToken){ stage.classList.remove("loading"); show(0); } });
    // …but only start cycling once ALL frames are decoded and cached.
    Promise.all(imgs.map(decoded)).then(function(){
      if(token!==frameToken) return;         // tab changed while we were decoding
      stage.classList.remove("loading");
      i = 0; show(0);
      frameTimer = setInterval(function(){ i=(i+1)%imgs.length; show(i); }, cfg.frame_ms);
    });
  }
  function stopFrames(){ frameToken++; if(frameTimer){ clearInterval(frameTimer); frameTimer=null; } }

  /* ---------------- tab machinery ---------------- */
  function tabStatus(t){
    if(t.type==="image"){ if(t.stale) return "offline"; if(t.file) return "live"; return ""; }
    if(t.frames){ if(t.stale) return "offline"; if((t.frames||[]).length) return "live"; return ""; }
    return "live";
  }
  function buildRail(){
    els.rail.innerHTML="";
    tabs.forEach(function(t,i){
      var b=document.createElement("button");
      b.className="tab s-"+tabStatus(t)+(i===idx?" active":"");
      b.innerHTML='<span class="pip"></span><span>'+(t.label||t.id)+'</span><span class="cyc"><i></i></span>';
      b.addEventListener("click", function(){ pinTo(i); });
      els.rail.appendChild(b);
    });
  }
  function markActiveRail(){
    var kids=els.rail.children;
    for(var i=0;i<kids.length;i++){ kids[i].classList.toggle("active", i===idx); }
    // run the cycle bar on the active tab (landscape only; hidden in portrait)
    var active=kids[idx]; if(!active) return;
    var bar=active.querySelector(".cyc > i"); if(!bar) return;
    bar.classList.remove("run"); bar.style.transition="none"; bar.style.width="0%";
    void bar.offsetWidth;
    if(!pinned){ var secs=(tabs[idx].dwell_seconds||cfg.tab_seconds);
      bar.style.transition="width "+secs+"s linear"; bar.classList.add("run"); }
  }

  function showTab(i){
    if(!tabs.length) return;
    idx=((i%tabs.length)+tabs.length)%tabs.length;
    var t=tabs[idx];
    els.kicker.textContent=t.kicker||((manifest&&manifest.location)||"Bay Conditions");
    els.title.textContent=t.label||t.id;
    els.stamp.textContent = stats&&stats.generated? "updated "+fmtAgo(stats.generated) : "";
    stopFrames();
    switch(t.type){
      case "overview": renderOverview(); break;
      case "wind":     renderWind(t); break;
      case "waves":    renderWaves(t); break;
      case "tides":    renderTides(); break;
      case "image":    renderImage(t); break;
      default:         if(t.frames) mountInto(t); else renderOverview();
    }
    markActiveRail();
    scheduleNext();
  }
  function mountInto(t){ els.view.innerHTML='<div class="stage" id="stage"></div>'; mountFrames(t,$("stage")); }

  function scheduleNext(){
    clearTimeout(autoTimer);
    if(pinned) return;
    var secs=(tabs[idx] && tabs[idx].dwell_seconds) || cfg.tab_seconds;
    autoTimer=setTimeout(function(){ showTab(idx+1); }, secs*1000);
  }
  function pinTo(i){
    pinned=true; clearTimeout(autoTimer); clearTimeout(resumeTimer);
    showTab(i);
    resumeTimer=setTimeout(function(){ pinned=false; markActiveRail(); scheduleNext(); },
                           (cfg.resume_after_seconds||60)*1000);
  }

  /* ---------------- data loading ---------------- */
  function applyCfg(m){
    ["tab_seconds","resume_after_seconds","frame_ms","manifest_reload_seconds",
     "stats_reload_seconds","page_reload_hours"].forEach(function(k){ if(m[k]!=null) cfg[k]=m[k]; });
  }
  function schedulePageReload(){
    if(reloadScheduled) return; reloadScheduled=true;
    var h=cfg.page_reload_hours>0?cfg.page_reload_hours:8;
    setTimeout(function(){ location.reload(); }, h*3600*1000);
  }
  function applyManifest(m){
    if(m.app_version && APP_VERSION.charAt(0)!=="_" && m.app_version!==APP_VERSION){
      location.reload(); return;   // running stale markup -> refresh
    }
    manifest=m; applyCfg(m); schedulePageReload();
    var currentId = tabs.length? tabs[idx].id : null;
    var firstLoad = tabs.length===0;
    tabs = m.tabs||[];
    if(!tabs.length){ els.view.innerHTML='<div class="placeholder">No tabs configured.</div>'; return; }
    buildRail();
    if(firstLoad){ idx=0; showTab(0); }
    else {
      var ni=-1; for(var i=0;i<tabs.length;i++){ if(tabs[i].id===currentId){ ni=i; break; } }
      idx = ni>=0?ni:Math.min(idx,tabs.length-1);
      // refresh current view in place with new frame lists / images
      showTab(idx);
    }
  }
  function applyStats(s){ stats=s; renderSCA();
    // live-refresh the current view if it's data-driven
    var t=tabs[idx]; if(!t) return;
    if(t.type==="overview") renderOverview();
    else if(t.type==="tides") renderTides();
    else if(t.type==="wind") renderWind(t);
    else if(t.type==="waves") renderWaves(t);
    els.stamp.textContent = s&&s.generated? "updated "+fmtAgo(s.generated):"";
  }

  function poll(url, apply, everyKey){
    fetch(url+"?cb="+Date.now(),{cache:"no-store"})
      .then(function(r){ if(!r.ok) throw 0; return r.json(); })
      .then(apply).catch(function(){})
      .finally(function(){ setTimeout(function(){ poll(url,apply,everyKey); }, (cfg[everyKey]||60)*1000); });
  }
  poll("manifest.json", applyManifest, "manifest_reload_seconds");
  poll("stats.json", applyStats, "stats_reload_seconds");
})();
</script>
</body>
</html>
